global:
  scrape_interval: 15s


rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
      - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: "prometheus" 
    static_configs:
      - targets: ["prometheus:9090"]


  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: "fastapi"
    static_configs:
      - targets: ["app:8000"] 
