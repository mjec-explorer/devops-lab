global:
  resolve_timeout: 5m

route:
  receiver: slack-alerts
  group_by: ["alertname", "job"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 5m
  routes:
    - matchers:
        - severity="critical"
      receiver: n8n-webhook
      continue: true

receivers:
  - name: slack-alerts
    slack_configs:
      - api_url_file: /run/secrets/slack_webhook
        channel: '#devops-lab-alerts'
        send_resolved: true
        title: '[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
        text: >-
          {{ range .Alerts -}}
          *Summary:* {{ .Annotations.summary }}
          *Instance:* {{ .Labels.instance }}
          *Job:* {{ .Labels.job }}
          *Severity:* {{ .Labels.severity }}
          {{ end }}

  - name: n8n-webhook
    webhook_configs:
      - url: 'http://n8n:5678/webhook/alertmanager'
