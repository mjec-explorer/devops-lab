global:
  resolve_timeout: 5m

route:
  receiver: n8n-webhook
  group_by: ["alertname", "job", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers:
      - service="n8n"
      receiver: slack-backup
    - matchers:
        - severity="critical"
      receiver: n8n-webhook
      continue: true
    - matchers:
        - severity="critical"
      receiver: slack-backup

receivers:
  - name: n8n-webhook
    webhook_configs:
      - url: 'http://n8n:5678/webhook/alertmanager'

  - name: slack-backup
    slack_configs:
      - api_url_file: /run/secrets/slack_webhook
        channel: '#devops-lab-alerts'
        send_resolved: true
        title: '[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
        text: |-
          Instance: {{ .CommonLabels.instance }}
          Severity: {{ .CommonLabels.severity }}
