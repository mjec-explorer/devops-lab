global:
  resolve_timeout: 5m

route:
  receiver: slack-default
  group_by: ["alertname", "job"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  routes:
    - matchers:
        - severity="critical"
      receiver: slack-critical
      continue: true

receivers:
  - name: slack-default
    slack_configs:
      - api_url_file: /run/secrets/slack_webhook 
        channel: '#devops-lab-alerts'
        send_resolved: true
        title: '[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
        text: >-
          {{ range .Alerts -}}
          *Summary:* {{ .Annotations.summary }}
          *Instance:* {{ .Labels.instance }}
          *Job:* {{ .Labels.job }}
          *Severity:* {{ .Labels.severity }}
          {{ end }}

  - name: slack-critical
    slack_configs:
      - api_url_file: /run/secrets/slack_webhook
        channel: '#devops-lab-critical'
        send_resolved: true
        title: '[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
        text: >-
          {{ range .Alerts -}}
          *Summary:* {{ .Annotations.summary }}
          *Instance:* {{ .Labels.instance }}
          *Job:* {{ .Labels.job }}
          *Severity:* {{ .Labels.severity }}
          {{ end }}

